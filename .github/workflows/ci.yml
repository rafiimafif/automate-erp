name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ──────────────────────────────────────────────
  # Backend: Python / Django Checks
  # ──────────────────────────────────────────────
  backend-ci:
    name: 🐍 Backend — Lint, Test & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install uv
          uv pip install --system -r requirements.txt

      - name: Lint with ruff
        working-directory: ./backend
        run: |
          ruff check .

      - name: Run Django system checks
        working-directory: ./backend
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Run migrations check
        working-directory: ./backend
        run: python manage.py migrate --run-syncdb
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Run tests with coverage
        working-directory: ./backend
        run: pytest --cov=api --cov-report=xml:coverage.xml --cov-report=term --tb=short
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Build Backend Docker Image for scanning
        run: docker build -t automateerp-backend:ci ./backend

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'automateerp-backend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ──────────────────────────────────────────────
  # Frontend: Node / React Checks
  # ──────────────────────────────────────────────
  frontend-ci:
    name: ⚛️  Frontend — Lint, Build & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: ./frontend
        run: npm run lint || echo "Lint warnings found, continuing."

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build

      - name: Build Frontend Docker Image for scanning
        run: docker build -t automateerp-frontend:ci ./frontend

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'automateerp-frontend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ──────────────────────────────────────────────
  # QA Automation: Playwright E2E Tests
  # ──────────────────────────────────────────────
  qa-automation:
    name: 🧪 QA Automation — Playwright
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r qa/requirements.txt
          playwright install --with-deps chromium

      - name: Start Services (Docker Compose)
        run: |
          docker compose up -d
          # Wait for services to be ready
          sleep 30 
          # Seed database with users and test data
          docker compose exec -T backend python manage.py seed_data

      - name: Run Playwright Tests
        run: |
          cd qa
          pytest --html=qa-report.html --self-contained-html
        env:
          BASE_URL: http://localhost:5173
          HEADLESS: true

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-automation-report
          path: qa/qa-report.html

  # ──────────────────────────────────────────────
  # SonarCloud Code Quality Analysis
  # ──────────────────────────────────────────────
  sonarcloud:
    name: 🔍 SonarCloud Code Quality
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize coverage files
        run: |
          mkdir -p backend frontend/coverage
          cp artifacts/backend-coverage/coverage.xml backend/coverage.xml || true
          cp artifacts/frontend-coverage/lcov.info frontend/coverage/lcov.info || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=rafiimafif_automate-erp
            -Dsonar.organization=rafiimafif
            -Dsonar.sources=backend,frontend/src
            -Dsonar.tests=frontend/src/tests,backend/api/tests
            -Dsonar.exclusions=**/node_modules/**,**/migrations/**,**/__pycache__/**,**/dist/**,**/venv/**,.venv/**,**/*.test.jsx,**/*.test.js,**/*.test.ts,**/tests/**,**/conftest.py,**/setupTests.js
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.coverage.exclusions=backend/api/migrations/**,backend/core/asgi.py,backend/core/wsgi.py,backend/manage.py,**/*.test.jsx,**/*.test.js,**/*.test.ts,**/tests/**,**/conftest.py,**/setupTests.js,**/vitest.config.*,**/vite.config.*,**/tailwind.config.*,**/postcss.config.*,**/*.config.js,**/*.config.cjs
            -Dsonar.cpd.exclusions=backend/api/migrations/**

