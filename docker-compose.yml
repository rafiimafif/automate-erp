version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: automateerp-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=automateerp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: automateerp-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: automateerp-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres@db:5432/automateerp
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: automateerp-frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automateerp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
