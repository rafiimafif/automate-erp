version: '3.8'

services:
  backend:
    image: automateerp-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: automateerp-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
    restart: unless-stopped

  frontend:
    image: automateerp-frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automateerp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
