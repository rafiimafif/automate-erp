sonar.projectKey=rafiimafif_automate-erp
sonar.organization=rafiimafif

# Project display name
sonar.projectName=automateERP
sonar.projectVersion=1.0

# Source directories
sonar.sources=backend,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/migrations/**,**/__pycache__/**,**/dist/**,**/venv/**,.venv/**

# Python backend
sonar.python.version=3.10

# JavaScript/JSX frontend
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Coverage exclusions  
sonar.coverage.exclusions=**/migrations/**,**/node_modules/**,**/dist/**
