sonar.projectKey=rafiimafif_automate-erp
sonar.organization=rafiimafif

# Project display name
sonar.projectName=automateERP
sonar.projectVersion=1.0

# Source directories (exclude test files from source analysis)
sonar.sources=backend,frontend/src

# Test directories
sonar.tests=frontend/src/tests,backend/api/tests

# Source exclusions — exclude test files so they're not analyzed as production code
sonar.exclusions=**/node_modules/**,**/migrations/**,**/__pycache__/**,**/dist/**,**/venv/**,.venv/**,**/*.test.jsx,**/*.test.js,**/*.test.ts,**/tests/**,**/conftest.py,**/setupTests.js

# Python backend
sonar.python.version=3.10

# JavaScript/JSX frontend
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Coverage exclusions — exclude test files, config, and non-production code from coverage measurement
sonar.coverage.exclusions=**/migrations/**,**/node_modules/**,**/dist/**,**/*.test.jsx,**/*.test.js,**/*.test.ts,**/tests/**,**/conftest.py,**/setupTests.js,**/vitest.config.*,**/vite.config.*,**/tailwind.config.*,**/postcss.config.*,**/*.config.js,**/*.config.cjs
